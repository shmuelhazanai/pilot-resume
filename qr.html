<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code — Shmuel Hazan Pilot Resume</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a1628;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: #f5f7fa;
      border-radius: 20px;
      padding: 36px 32px 28px;
      text-align: center;
      max-width: 340px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .wings {
      font-size: 22px;
      letter-spacing: 4px;
      color: #c9a84c;
      margin-bottom: 10px;
    }

    .card h1 {
      font-size: 20px;
      font-weight: 700;
      color: #0a1628;
      letter-spacing: 0.5px;
    }

    .card .subtitle {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c9a84c;
      margin-top: 4px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      margin: 14px auto;
    }

    #qrcode {
      display: flex;
      justify-content: center;
      margin: 4px 0 16px;
    }

    #qrcode canvas {
      border-radius: 10px;
      border: 4px solid #0a1628;
    }

    .scan-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8fa0b8;
      margin-bottom: 16px;
    }

    .download-btn {
      display: inline-block;
      background: #0a1628;
      color: #c9a84c;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 10px 24px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .download-btn:hover { background: #16305a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="wings">✈</div>
    <h1>Shmuel Hazan</h1>
    <p class="subtitle">Pilot Resume</p>
    <div class="divider"></div>
    <div id="qrcode"></div>
    <p class="scan-label">Scan to view resume</p>
    <button class="download-btn" onclick="downloadQR()">Download QR Code</button>
  </div>

  <script>
    const url = 'https://shmuelhazanai.github.io/pilot-resume';

    const qr = new QRCode(document.getElementById('qrcode'), {
      text: url,
      width: 220,
      height: 220,
      colorDark: '#0a1628',
      colorLight: '#f5f7fa',
      correctLevel: QRCode.CorrectLevel.H
    });

    function downloadQR() {
      const canvas = document.querySelector('#qrcode canvas');
      if (!canvas) return;
      const link = document.createElement('a');
      link.download = 'shmuel-hazan-pilot-qr.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
